<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPR AI Image Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
<div class="max-w-5xl mx-auto px-6 py-10">
    <div class="mb-8">
        <h1 class="text-4xl font-bold tracking-tight">AI Image Detector</h1>
        <p class="mt-2 text-slate-300">
            Flask + Tailwind frontend using a custom NPR ResNet-50 classifier.
        </p>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
            <h2 class="text-xl font-semibold mb-4">Upload image</h2>

            <form method="POST" enctype="multipart/form-data" class="space-y-4">
                <input
                        type="file"
                        name="image"
                        accept=".png,.jpg,.jpeg,.webp"
                        class="block w-full text-sm text-slate-300
                               file:mr-4 file:py-2 file:px-4
                               file:rounded-xl file:border-0
                               file:text-sm file:font-semibold
                               file:bg-indigo-600 file:text-white
                               hover:file:bg-indigo-500"
                />

                <button
                        type="submit"
                        class="w-full rounded-xl bg-emerald-600 hover:bg-emerald-500 transition px-4 py-3 font-semibold"
                >
                    Run detection
                </button>
            </form>

            {% if error %}
            <div class="mt-4 rounded-xl border border-red-500/30 bg-red-500/10 p-4 text-red-300">
                {{ error }}
            </div>
            {% endif %}
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
            <h2 class="text-xl font-semibold mb-4">Prediction</h2>

            {% if image_url %}
            <img
                    src="{{ image_url }}"
                    alt="Uploaded image"
                    class="w-full h-80 object-contain rounded-xl border border-slate-800 bg-slate-950"
            />

            <div class="mt-5 grid grid-cols-2 gap-4">
                <div class="rounded-xl bg-slate-800 p-4">
                    <p class="text-sm text-slate-400">Label</p>
                    <p class="text-lg font-bold mt-1">{{ result }}</p>
                </div>

                <div class="rounded-xl bg-slate-800 p-4">
                    <p class="text-sm text-slate-400">Fake probability</p>
                    <p class="text-lg font-bold mt-1">
                        {{ "%.2f"|format(probability * 100) }}%
                    </p>
                </div>
            </div>
            {% else %}
            <div class="h-80 rounded-xl border border-dashed border-slate-700 flex items-center justify-center text-slate-400">
                No image uploaded yet.
            </div>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
